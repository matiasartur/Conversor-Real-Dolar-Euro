<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor Dolar/Euro</title>
</head>

<body>
    <img src="assets/logo.gif" alt="gif-logo">

    <main>
        <label for="">
            Converter <b>de</b>
            <select name="" id="">
                <option value="">R$ Real Brasileiro</option>
            </select>
        </label>

        <label for="">
            Converter <b>para</b>
            <select name="" id="">
                <option value="">U$ Dólar Americano</option>
                <option value="">€ Euro</option>
            </select>
        </label> 

        <label for="">
            Valor
            <input placeholder="R$10.000,00">
        </label>

        <button>Converter</button>

        <section>
            <div>
                <img src="assets/brasil.png" alt="moeda-a-converter">
                <p>Real</p>
                <p>R$ 0,00</p>
            </div>

            <img src="assets/seta.png" alt="seta">

            <div>
                <img src="assets/usa.png" alt="moeda-convertida">
                <p>Dólar</p>
                <p>U$ 0,00</p>
            </div>
        </section>

    </main>

</body>
<script src="script.js"></script>

</html>
